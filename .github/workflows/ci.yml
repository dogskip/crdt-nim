name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        nim: ['2.0.0', 'stable']
    steps:
      - uses: actions/checkout@v4
      - name: Nim 설치
        uses: jiro4989/setup-nim-action@v1
        with:
          nim-version: ${{ matrix.nim }}
      - name: 의존성 확인
        run: nimble refresh
      - name: 테스트 실행
        run: nimble test
